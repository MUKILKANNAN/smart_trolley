<!DOCTYPE html>
<html>
<head>
    <title>Smart Trolley</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <style>
        body { background: #f0f3f7; }
        .flipkart-blue { background: #2874f0; color: white; padding: 20px; }
        #scanner-container { display: none; width: 100%; height: 250px; border: 2px solid #2874f0; border-radius: 10px; margin-bottom: 15px; }
        .cart-card { min-height: 300px; border-radius: 15px; }
    </style>
</head>
<body>

<div class="flipkart-blue text-center">
    <h3 class="fw-bold">Smart Trolley</h3>
</div>

<div class="container mt-4">
    <div class="row">

        <!-- LEFT COLUMN -->
        <div class="col-md-6">
            <!-- Scanner -->
            <div class="card p-4 shadow-sm border-0 mb-3">
                <button class="btn btn-primary w-100 p-3 mb-3 fw-bold" onclick="toggleCamera()">📷 SCAN BARCODE</button>
                <div id="scanner-container"></div>

                <div class="input-group">
                    <input type="text" id="manualCode" class="form-control" placeholder="Enter Code (1001-1004)">
                    <button class="btn btn-dark" onclick="sendItem(document.getElementById('manualCode').value)">Add</button>
                </div>
            </div>

            <!-- Recommendations -->
            <div class="card p-3 shadow-sm border-0">
                <h5 class="fw-bold">Recommended for you</h5>
                <ul id="recommendations" class="list-group list-group-flush">
                    <li class="list-group-item text-muted">Scan a product to see recommendations</li>
                </ul>
            </div>
        </div>

        <!-- RIGHT COLUMN -->
        <div class="col-md-6">
            <div class="card p-4 shadow-sm cart-card border-0">
                <h5 class="fw-bold mb-3 border-bottom pb-2">Shopping Cart</h5>
                <div id="cartDisplay"></div>

                <div class="mt-auto border-top pt-3">
                    <div class="d-flex justify-content-between h3 fw-bold">
                        <span>Total:</span>
                        <span class="text-primary">₹<span id="totalAmt">0</span></span>
                    </div>
                    <button class="btn btn-success w-100 p-3 mt-2 fw-bold"
                            onclick="location.href='/payment_page'">
                        PROCEED TO PAY
                    </button>
                </div>
            </div>
        </div>

    </div>
</div>

<script>
    let scanning = false;

    function toggleCamera() {
        let container = document.getElementById('scanner-container');
        if (!scanning) {
            container.style.display = 'block';
            Quagga.init({
                inputStream: { name: "Live", type: "LiveStream", target: container },
                decoder: { readers: ["code_128_reader"] }
            }, () => Quagga.start());
            scanning = true;
        } else {
            Quagga.stop();
            container.style.display = 'none';
            scanning = false;
        }
    }

    Quagga.onDetected((r) => {
        toggleCamera();
        sendItem(r.codeResult.code);
    });

    function sendItem(code) {
        fetch('/scan_barcode', {   // ✅ CORRECT ENDPOINT
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ code: code })
        })
        .then(r => r.json())
        .then(d => {
            if (!d.success) return;

            updateUI(d);
            updateRecommendations(d.recommendations); // ✅ NOW IT WORKS
        });
    }


    function updateRecommendations(recs) {
        const ul = document.getElementById("recommendations");
        ul.innerHTML = "";

        if (!recs || recs.length === 0) {
            ul.innerHTML = `<li class="list-group-item text-muted">No recommendations found</li>`;
            return;
        }

        recs.forEach(item => {
            ul.innerHTML += `<li class="list-group-item">${item}</li>`;
        });
    }

    function updateUI(d) {
        let display = document.getElementById('cartDisplay');
        display.innerHTML = "";

        for (let code in d.cart) {
            let item = d.cart[code];
            display.innerHTML += `
                <div class="d-flex justify-content-between align-items-center mb-2 p-3 bg-light rounded">
                    <span>
                        <b>${item.name}</b><br>
                        <small class="text-muted">₹${item.price}/unit</small>
                    </span>
                    <b class="text-primary">₹${item.price * item.qty}</b>
                </div>`;
        }
        document.getElementById('totalAmt').innerText = d.total;
    }
</script>

</body>
</html>
